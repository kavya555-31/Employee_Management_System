<!DOCTYPE html>
<html>
    
<head>
    <title>Add Employee</title>
    <link rel="stylesheet"
href="{{ url_for('static',
filename='css/style.css') }}">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>
<nav class="navbar navbar-dark bg-dark p-3 justify-content-center">
    <a class="navbar-brand">
        Employee Management System
    </a>
</nav>
{% with messages = get_flashed_messages() %}
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-success mt-3">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}
<div class="container mt-5" style="max-width:700px;"></div>
<h1 class="text-center mb-4">
        Add Employee
    </h1>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
<form method="POST" enctype="multipart/form-data">

   <div class="mb-3">
    <label class="form-label">Employee ID</label>
    <input type="number" name="emp_id" class="form-control" required>
</div>

<div class="mb-3">
    <label class="form-label">Name</label>
  <input type="text" name="name" class="form-control" required>
</div>

<div class="mb-3">
    <label class="form-label">Department</label>
    <input type="text" name="department" class="form-control" required>
</div>

<div class="mb-3">
    <label class="form-label">Salary</label>
 
<input type="number" name="salary" class="form-control" min="1" required>
</div>

<div class="mb-3">
    <label class="form-label">Email</label>
    <input type="email" name="email" class="form-control" required>
</div>

<div class="mb-3">
    <label class="form-label">Photo</label>
<input type="file" name="photo" class="form-control" required>
</div>

<button type="submit" class="btn btn-primary w-100">
    Save Employee
</button>

</form>
        </div>
    </div>
</div>
</body>
</html>
